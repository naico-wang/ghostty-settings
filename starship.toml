"$schema" = 'https://starship.rs/config-schema.json'

# Configures the format of the prompt.
format = """
$os\
$username\
$directory\
${custom.dir_tail}\
$git_branch\
$fill\
$c\
$dotnet\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
$elixir\
$elm\
$gradle\
$julia\
$nim\
$scala\
$time\
$battery\
$line_break\
$character"""

# Sets the palette to "one_dark".
palette = 'one_dark'

# Sets the colors of the "one_dark" palette.
[palettes.one_dark]
mono0 = '#d7dae0' # terminal white, from the One Dark Pro VSCode theme.
mono1 = '#abb2bf' # syntax_fg.
mono2 = '#828997'
mono3 = '#5c6370'
mono4 = '#3f4451' # terminal black, from the One Dark Pro VSCode theme.
color_red0 = '#e06c75'
color_red1 = '#be5046'
color_red2 = '#d31334'
color_green = '#98c379'
color_yellow = '#e5c07b'
color_blue = '#61afef'
color_purple = '#c678dd'
color_cyan = '#56b6c2'
color_orange = '#d19a66'
syntax_fg = '#abb2bf'
syntax_bg = '#282c34'
color_bg2 = '#665c54'
syntax_gutter = '#647382'
syntax_accent = '#528cff'

# Module that displays the current OS.
[os]
disabled = false # Disabled by default
style = "fg:mono0 bg:color_red1"
format = '[ $symbol ]($style)'

# Sets custom symbols for each OS.
[os.symbols]
Alpine = "’īĆ"
Amazon = "’ē░"
Android = "¾░Ć▓"
Arch = "’īā"
CentOS = "’īä"
Debian = "¾░ŻÜ"
EndeavourOS = "’īó"
Fedora = "¾░Żø"
FreeBSD = "¾░ŻĀ"
Gentoo = "¾░Ż©"
Illumos = "’ī”"
Linux = "¾░īĮ"
Macos = "¾░Ź▓"
Manjaro = "¾▒śŖ"
Mint = "¾░ŻŁ"
NixOS = "¾▒äģ"
OpenBSD = "’ī©"
openSUSE = "’īö"
Pop = "’ī¬"
Raspbian = "’īĢ"
Redhat = "¾▒äø"
RedHatEnterprise = "¾▒äø"
Redox = "R"
Solus = "’īŁ"
SUSE = "’īö"
Ubuntu = "¾░Ģł"
Unknown = "’üÖ"
Windows = "¾░Ź▓"

# Module that displays the current username.
[username]
show_always = true
style_user = "bold fg:mono0 bg:color_red1"
style_root = "bold fg:mono0 bg:color_purple"
format = '[$user ]($style)'

# Module that displays the current directory.
[directory]
style = "bold fg:syntax_bg bg:color_green"
format = "[ $path ]($style)"
truncation_length = 1
truncate_to_repo = false

[custom.dir_tail]
when = ''' ! git rev-parse --is-inside-work-tree >/dev/null 2>&1 '''
command = "true"
format = ""

# Module that displays the current git branch.
[git_branch]
symbol = "’Éś"
style = "bg:color_yellow"
format = '[[ $symbol $branch ](fg:syntax_bg bg:color_yellow)]($style)'

# Language specific modules
[nodejs]
symbol = "Ņ£ś"
style = "bg:color_green"
format = '[[ $symbol( $version) ](fg:syntax_bg bg:color_green)]($style)'

[c]
symbol = "Ņś× "
style = "bg:color_green"
format = '[[ $symbol( $version) ](fg:syntax_bg bg:color_green)]($style)'

[dotnet]
